name: task_manager_pro
description: "A powerful task management app to organize your daily activities efficiently."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core packages
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  
  # UI & Utilities
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.13.1  # For custom app icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Custom App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6C63FF"  # Purple background
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_padding: 8
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icon/

  # Custom Fonts (optional - uncomment to use)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700